services:
  backend:
    image: ${DOCKER_USERNAME}/openlog:backend-latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      JWT_SECRET: ${OPENLOG_SECRET_KEY}
      STORAGE_ENDPOINT: ${MINIO_ENDPOINT}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_BUCKET: openlog
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"

  frontend:
    image: ${DOCKER_USERNAME}/openlog:frontend-latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: http://backend:8000
