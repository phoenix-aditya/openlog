name: Release Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0)"
        required: true
        type: string
      image:
        description: "Which image to build"
        required: true
        type: choice
        options:
          - both
          - backend
          - frontend
      changelog:
        description: "What changed in this release?"
        required: true
        type: string

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    if: ${{ inputs.image == 'both' || inputs.image == 'backend' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openlog:backend-${{ inputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/openlog:backend-latest

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    if: ${{ inputs.image == 'both' || inputs.image == 'frontend' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openlog:frontend-${{ inputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/openlog:frontend-latest

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: ${{ always() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release body
        id: body
        run: |
          IMAGE="${{ inputs.image }}"
          VERSION="${{ inputs.version }}"
          IMAGES_SECTION=""
          if [[ "$IMAGE" == "both" || "$IMAGE" == "backend" ]]; then
            IMAGES_SECTION+="- \`${{ secrets.DOCKER_USERNAME }}/openlog:backend-${VERSION}\`\n"
          fi
          if [[ "$IMAGE" == "both" || "$IMAGE" == "frontend" ]]; then
            IMAGES_SECTION+="- \`${{ secrets.DOCKER_USERNAME }}/openlog:frontend-${VERSION}\`\n"
          fi
          BODY="## What's changed\n\n${{ inputs.changelog }}\n\n## Docker images\n\n${IMAGES_SECTION}"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
